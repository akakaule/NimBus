trigger: none

parameters:
  - name: solutionId
    displayName: "Solution identifier used in Azure resource names"
    type: string
  - name: environment
    displayName: "Environment name (e.g. dev, staging, prod)"
    type: string
  - name: resourceGroup
    displayName: "Azure resource group name"
    type: string
  - name: azureServiceConnection
    displayName: "Azure service connection name"
    type: string
  - name: resolverPlan
    displayName: "Resolver hosting plan: ElasticPremium | FlexConsumption (empty = existing plan, else FlexConsumption)"
    type: string
    default: ""
  - name: managementPlanSku
    displayName: "Management App Service Plan SKU (empty = existing SKU, else B1 for dev, S1 otherwise)"
    type: string
    default: ""
  - name: location
    displayName: "Azure region for new resources (empty = westeurope; existing resources keep their region)"
    type: string
    default: ""

pool:
  vmImage: ubuntu-latest

steps:
  - task: UseDotNet@2
    displayName: Setup .NET 10
    inputs:
      packageType: sdk
      version: 10.0.x

  - task: NodeTool@0
    displayName: Setup Node.js 22
    inputs:
      versionSpec: 22.x

  - script: dotnet build src/NimBus.CommandLine/NimBus.CommandLine.csproj -c Release
    displayName: Build nb CLI

  - task: AzureCLI@2
    displayName: "Deploy: infra → topology → apps"
    env:
      NB_RESOLVER_PLAN: ${{ parameters.resolverPlan }}
      NB_MANAGEMENT_PLAN_SKU: ${{ parameters.managementPlanSku }}
      NB_LOCATION: ${{ parameters.location }}
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        EXTRA_ARGS=()
        if [ -n "$NB_RESOLVER_PLAN" ]; then EXTRA_ARGS+=(--resolver-plan "$NB_RESOLVER_PLAN"); fi
        if [ -n "$NB_MANAGEMENT_PLAN_SKU" ]; then EXTRA_ARGS+=(--management-plan-sku "$NB_MANAGEMENT_PLAN_SKU"); fi
        if [ -n "$NB_LOCATION" ]; then EXTRA_ARGS+=(--location "$NB_LOCATION"); fi
        dotnet run --project src/NimBus.CommandLine --no-build -c Release -- \
          setup \
          --solution-id "${{ parameters.solutionId }}" \
          --environment "${{ parameters.environment }}" \
          --resource-group "${{ parameters.resourceGroup }}" \
          "${EXTRA_ARGS[@]}"
