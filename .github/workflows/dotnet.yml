# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      # SQL Server service container for the SQL Server message store conformance suite.
      # Tests skip themselves when NIMBUS_SQL_TEST_CONNECTION is unset, so this only
      # adds runtime cost when the SQL provider needs real coverage in CI.
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: 'YourStrong@Passw0rd'
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -No -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    env:
      NIMBUS_SQL_TEST_CONNECTION: "Server=localhost,1433;User ID=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Database=master"

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Restore dependencies
      run: dotnet restore src/NimBus.sln
    - name: Build
      run: dotnet build src/NimBus.sln --no-restore --configuration Release
    - name: Test
      run: dotnet test src/NimBus.sln --no-build --configuration Release --verbosity normal
