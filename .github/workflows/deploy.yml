name: Deploy NimBus

on:
  workflow_dispatch:
    inputs:
      solution-id:
        description: "Solution identifier used in Azure resource names"
        required: true
        type: string
      environment:
        description: "Environment name (e.g. dev, staging, prod)"
        required: true
        type: string
      resource-group:
        description: "Azure resource group name"
        required: true
        type: string
      resolver-plan:
        description: "Resolver hosting plan: ElasticPremium | FlexConsumption (empty = existing plan, else FlexConsumption)"
        required: false
        type: string
        default: ""
      management-plan-sku:
        description: "Management App Service Plan SKU (empty = existing SKU, else B1 for dev, S1 otherwise)"
        required: false
        type: string
        default: ""
      location:
        description: "Azure region for new resources (empty = westeurope; existing resources keep their region)"
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build nb CLI
        run: dotnet build src/NimBus.CommandLine/NimBus.CommandLine.csproj -c Release

      - name: Deploy infrastructure
        env:
          NB_SOLUTION_ID: ${{ inputs.solution-id }}
          NB_ENVIRONMENT: ${{ inputs.environment }}
          NB_RESOURCE_GROUP: ${{ inputs.resource-group }}
          NB_RESOLVER_PLAN: ${{ inputs.resolver-plan }}
          NB_MANAGEMENT_PLAN_SKU: ${{ inputs.management-plan-sku }}
          NB_LOCATION: ${{ inputs.location }}
        run: |
          EXTRA_ARGS=()
          if [ -n "$NB_RESOLVER_PLAN" ]; then EXTRA_ARGS+=(--resolver-plan "$NB_RESOLVER_PLAN"); fi
          if [ -n "$NB_MANAGEMENT_PLAN_SKU" ]; then EXTRA_ARGS+=(--management-plan-sku "$NB_MANAGEMENT_PLAN_SKU"); fi
          if [ -n "$NB_LOCATION" ]; then EXTRA_ARGS+=(--location "$NB_LOCATION"); fi
          dotnet run --project src/NimBus.CommandLine --no-build -c Release -- \
            infra apply \
            --solution-id "$NB_SOLUTION_ID" \
            --environment "$NB_ENVIRONMENT" \
            --resource-group "$NB_RESOURCE_GROUP" \
            "${EXTRA_ARGS[@]}"

      - name: Provision Service Bus topology
        env:
          NB_SOLUTION_ID: ${{ inputs.solution-id }}
          NB_ENVIRONMENT: ${{ inputs.environment }}
          NB_RESOURCE_GROUP: ${{ inputs.resource-group }}
        run: >
          dotnet run --project src/NimBus.CommandLine --no-build -c Release --
          topology apply
          --solution-id "$NB_SOLUTION_ID"
          --environment "$NB_ENVIRONMENT"
          --resource-group "$NB_RESOURCE_GROUP"

      - name: Deploy applications
        env:
          NB_SOLUTION_ID: ${{ inputs.solution-id }}
          NB_ENVIRONMENT: ${{ inputs.environment }}
          NB_RESOURCE_GROUP: ${{ inputs.resource-group }}
        run: >
          dotnet run --project src/NimBus.CommandLine --no-build -c Release --
          deploy apps
          --solution-id "$NB_SOLUTION_ID"
          --environment "$NB_ENVIRONMENT"
          --resource-group "$NB_RESOURCE_GROUP"
